<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD-ADB Tesla UI</title>

<style>
body{
    margin:0;
    background:#05070c;
    font-family:Arial;
    color:white;
}

/* START SCREEN */
#startScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.toggle{
    width:50px;
    height:25px;
    background:#333;
    border-radius:25px;
    position:relative;
    cursor:pointer;
    margin-top:10px;
}
.toggle::after{
    content:"";
    width:20px;
    height:20px;
    background:white;
    position:absolute;
    top:2px;
    left:3px;
    border-radius:50%;
    transition:0.3s;
}
.toggle.active{background:#00e5ff;}
.toggle.active::after{left:25px;}

/* MAIN UI */
.header{
    height:60px;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    align-items:center;
}

.container{display:flex;height:calc(100vh - 60px);}

.left{
    width:250px;
    padding:15px;
    background:rgba(20,25,40,0.6);
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:900px;
    height:600px;
    position:relative;
    border:1px solid rgba(0,229,255,0.3);
    border-radius:15px;
    overflow:hidden;
}

video, canvas{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

.controls{
    position:absolute;
    right:10px;
    top:10px;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1 style="color:#00e5ff;">HD-ADB SYSTEM</h1>
    <div>ENABLE SYSTEM</div>
    <div class="toggle" id="systemToggle"></div>
    <button onclick="enterSystem()" style="margin-top:20px;">ENTER</button>
</div>

<!-- MAIN -->
<div id="mainUI" style="display:none;">

<div class="header">
    <h1>HD-ADB MATRIX SYSTEM</h1>
</div>

<div class="container">

<div class="left">
    <div id="obj">Objects: 0</div>
    <div id="lane">Lane: --</div>
    <div id="weather">Weather: --</div>
</div>

<div class="right">
<div class="box">

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <div>Stream</div>
        <div class="toggle" id="streamToggle"></div>
    </div>

</div>
</div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

let enabled=false;
let streamOn=true;
let lastVoice=0;

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=900;
canvas.height=600;

/* CATEGORY */
const CATEGORY={
    person:["person"],
    vehicle:["car","truck","bus"],
    animal:["dog","cat","cow","horse","sheep"]
};

/* START TOGGLE */
systemToggle.onclick=()=>{
    enabled=!enabled;
    systemToggle.classList.toggle("active");
};

/* ENTER */
window.enterSystem=()=>{
    if(!enabled){
        alert("Enable system first");
        return;
    }

    startScreen.style.display="none";
    mainUI.style.display="block";

    navigator.mediaDevices.getUserMedia({
        video:{facingMode:"environment"}
    }).then(s=>video.srcObject=s);
};

/* STREAM TOGGLE */
streamToggle.onclick=()=>{
    streamOn=!streamOn;
    streamToggle.classList.toggle("active");

    video.style.display = streamOn ? "block" : "none";
};

/* VOICE */
function speak(msg){
    let now=Date.now();
    if(now-lastVoice<3000) return;
    speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
    lastVoice=now;
}

/* SEND FRAME */
function sendFrame(){

    const temp=document.createElement("canvas");
    temp.width=900;
    temp.height=600;

    const tctx=temp.getContext("2d");
    tctx.drawImage(video,0,0,900,600);

    temp.toBlob(blob=>{
        const form=new FormData();
        form.append("image",blob);

        fetch("https://hdadbprjct.duckdns.org/detect",{
            method:"POST",
            body:form
        })
        .then(r=>r.json())
        .then(draw);
    },"image/jpeg",0.7);
}

/* DRAW */
function draw(data){

    ctx.clearRect(0,0,900,600);
    if(streamOn) ctx.drawImage(video,0,0,900,600);

    let count={person:0,vehicle:0,animal:0};

    (data.objects||[]).forEach(o=>{
        let l=o.label.toLowerCase();

        for(let k in CATEGORY){
            if(CATEGORY[k].includes(l)) count[k]++;
        }

        if(streamOn){
            ctx.strokeStyle="#00e5ff";
            ctx.strokeRect(o.x1,o.y1,o.x2-o.x1,o.y2-o.y1);
            ctx.fillText(l.toUpperCase(),o.x1,o.y1-5);
        }
    });

    /* BUILD MESSAGE */
    let parts=[];
    if(count.person) parts.push(count.person+" person");
    if(count.vehicle) parts.push(count.vehicle+" vehicle");
    if(count.animal) parts.push(count.animal+" animal");

    let msg=parts.join(" | ");

    if(parts.length){
        document.getElementById("obj").innerText=msg.toUpperCase()+" DETECTED";
        speak(parts.join(" and ")+" detected");
    }else{
        document.getElementById("obj").innerText="Objects: 0";
    }

    /* LANE */
    document.getElementById("lane").innerText =
        data.lane_detected ? "🟢 LANE DETECTED" : "🔴 NO LANE";

    /* WEATHER */
    let w=(data.weather||"clear").toLowerCase();
    let icon="☀️";
    if(w.includes("rain")) icon="🌧️";
    if(w.includes("cloud")) icon="☁️";
    if(w.includes("fog")) icon="🌫️";

    document.getElementById("weather").innerText=icon+" "+w.toUpperCase();
}

/* LOOP */
setInterval(sendFrame,300);

});
</script>

</body>
</html>
