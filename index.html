<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD-ADB Tesla UI</title>

<style>
body{
    margin:0;
    background:#05070c;
    font-family:Arial;
    color:white;
}

/* START SCREEN */
#startScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.toggle{
    width:50px;
    height:25px;
    background:#333;
    border-radius:25px;
    position:relative;
    cursor:pointer;
    margin-top:10px;
}
.toggle::after{
    content:"";
    width:20px;
    height:20px;
    background:white;
    position:absolute;
    top:2.5px;
    left:3px;
    border-radius:50%;
    transition:0.3s;
}
.toggle.active{ background:#00e5ff; }
.toggle.active::after{ left:25px; }

/* MAIN UI */
.header{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:rgba(10,15,25,0.9);
}

.container{ display:flex; height:calc(100vh - 60px); }

.left{
    width:250px;
    background:rgba(20,25,40,0.6);
    padding:15px;
}
.card{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:10px;
}
.status{ margin:5px 0; }

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:900px;
    height:600px;
    position:relative;
    border-radius:15px;
    overflow:hidden;
    border:1px solid rgba(0,229,255,0.3);
}

video, canvas{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

.grid{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
    background:
        linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
    background-size:90px 75px;
}

.controls{
    position:absolute;
    right:10px;
    top:10px;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
    font-size:12px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1 style="color:#00e5ff;">HD-ADB SYSTEM</h1>
    <div>ENABLE SYSTEM</div>
    <div class="toggle" id="systemToggle"></div>
    <button onclick="enterSystem()" style="margin-top:20px;">ENTER</button>
</div>

<!-- MAIN -->
<div id="mainUI" style="display:none;">

<div class="header">
    <h1>HD-ADB MATRIX SYSTEM</h1>
    <div>AUTONOMOUS HUD</div>
</div>

<div class="container">

<div class="left">
    <div class="card">
        <div id="obj">Objects: 0</div>
        <div id="lane">Lane: --</div>
        <div id="weather">Weather: --</div>
    </div>
</div>

<div class="right">
<div class="box">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="grid"></div>

    <div class="controls" id="summary">
        No objects
    </div>
</div>
</div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

let systemEnabled=false;
let lastSpoken=0;
let msgTimeout=null;

const toggle=document.getElementById("systemToggle");

/* CATEGORY */
const CATEGORY={
    person:["person"],
    vehicle:["car","truck","bus"],
    animal:["dog","cat","cow","horse","sheep"]
};

/* TOGGLE */
toggle.onclick=()=>{
    systemEnabled=!systemEnabled;
    toggle.classList.toggle("active");
};

/* ENTER */
window.enterSystem=function(){
    if(!systemEnabled){
        alert("Enable system first");
        return;
    }

    startScreen.style.display="none";
    mainUI.style.display="block";

    navigator.mediaDevices.getUserMedia({video:true})
    .then(s=>video.srcObject=s);
};

/* VOICE */
function speak(msg){
    let now=Date.now();
    if(now-lastSpoken<3000) return;
    speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
    lastSpoken=now;
}

/* LEFT MESSAGE */
function showMsg(text,count){
    const obj=document.getElementById("obj");
    obj.innerText=text;

    if(msgTimeout) clearTimeout(msgTimeout);
    msgTimeout=setTimeout(()=>{
        obj.innerText="Objects: "+count;
    },5000);
}

/* SEND FRAME */
function sendFrame(){

    let t=document.createElement("canvas");
    t.width=900; t.height=600;

    let tc=t.getContext("2d");
    tc.drawImage(video,0,0,900,600);

    t.toBlob(b=>{
        let f=new FormData();
        f.append("image",b);

        fetch("https://hdadbprjct.duckdns.org/detect",{method:"POST",body:f})
        .then(r=>r.json())
        .then(draw);
    },"image/jpeg",0.7);
}

/* DRAW */
function draw(data){

    ctx.drawImage(video,0,0,900,600);

    let count={person:0,vehicle:0,animal:0};

    (data.objects||[]).forEach(o=>{
        let l=o.label.toLowerCase();

        for(let k in CATEGORY){
            if(CATEGORY[k].includes(l)) count[k]++;
        }

        ctx.strokeStyle="#00e5ff";
        ctx.strokeRect(o.x1,o.y1,o.x2-o.x1,o.y2-o.y1);
        ctx.fillText(l.toUpperCase(),o.x1,o.y1-5);
    });

    /* BUILD MESSAGE */
    let parts=[];
    if(count.person) parts.push(count.person+" person");
    if(count.vehicle) parts.push(count.vehicle+" vehicle");
    if(count.animal) parts.push(count.animal+" animal");

    let msg=parts.join(" | ");

    if(parts.length){
        showMsg(msg.toUpperCase()+" DETECTED", parts.length);
        speak(parts.join(" and ")+" detected");
        document.getElementById("summary").innerText=msg;
    }

    /* LANE */
    document.getElementById("lane").innerText=
        data.lane_detected ? "🟢 LANE DETECTED" : "🔴 NO LANE";

    /* WEATHER */
    let w=(data.weather||"clear").toLowerCase();
    let icon="☀️";
    if(w.includes("rain")) icon="🌧️";
    else if(w.includes("cloud")) icon="☁️";
    else if(w.includes("fog")) icon="🌫️";

    document.getElementById("weather").innerText=icon+" "+w.toUpperCase();
}

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=900;
canvas.height=600;

setInterval(sendFrame,300);

});
</script>

</body>
</html>
