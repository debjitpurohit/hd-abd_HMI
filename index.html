
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD-ADB Tesla UI</title>

<style>
body{
    margin:0;
    background:#05070c;
    font-family:Arial;
    color:white;
}

/* START SCREEN */
#startScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#05070c;
    position:absolute;
    width:100%;
    z-index:10;
}

.toggle{
    width:50px;
    height:25px;
    background:#333;
    border-radius:25px;
    position:relative;
    cursor:pointer;
    margin-top:10px;
}

.toggle::after{
    content:"";
    width:20px;
    height:20px;
    background:white;
    position:absolute;
    top:2.5px;
    left:3px;
    border-radius:50%;
    transition:0.3s;
}

.toggle.active{
    background:#00e5ff;
}
.toggle.active::after{
    left:25px;
}

/* HEADER */
.header{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:rgba(10,15,25,0.9);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.header h1{
    color:#00e5ff;
    font-size:15px;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* LEFT PANEL */
.left{
    width:250px;
    background:rgba(20,25,40,0.6);
    padding:15px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
}

.status{
    font-size:13px;
    margin:5px 0;
}

/* RIGHT */
.right{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CAMERA BOX */
.box{
    width:900px;
    height:600px;
    position:relative;
    border-radius:15px;
    overflow:hidden;
    border:1px solid rgba(0,229,255,0.3);
}

/* VIDEO */
video, canvas{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* GRID */
.grid{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
    background:
        linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
    background-size:90px 75px;
}

/* HUD */
.controls{
    position:absolute;
    right:10px;
    top:10px;
    width:180px;
    background:rgba(0,0,0,0.4);
    padding:10px;
    border-radius:10px;
    font-size:12px;
    border:1px solid rgba(0,255,255,0.2);
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
    <h1 style="color:#00e5ff;">HD-ADB SYSTEM</h1>
    <div>ENABLE SYSTEM</div>
    <div class="toggle" id="systemToggle"></div>

    <button onclick="enterSystem()" style="
        margin-top:20px;
        padding:10px 25px;
        background:#00e5ff;
        border:none;
        border-radius:20px;">
        ENTER
    </button>
</div>

<!-- MAIN UI -->
<div id="mainUI" style="display:none;">

<div class="header">
    <h1>HD-ADB MATRIX SYSTEM</h1>
    <div>AUTONOMOUS HUD</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">
    <div class="card">
        <div class="status" id="obj">Objects: 0</div>
        <div class="status" id="lane">Lane: --</div>
        <div class="status" id="weather">Weather: --</div>
    </div>
</div>

<!-- RIGHT -->
<div class="right">
<div class="box">

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="grid"></div>

    <div class="controls">
        <div>System: ACTIVE</div>
    </div>

</div>
</div>

</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", ()=>{

let systemEnabled = false;

const toggle = document.getElementById("systemToggle");
const startScreen = document.getElementById("startScreen");
const mainUI = document.getElementById("mainUI");

/* IMPORTANT CLASSES */
const IMPORTANT = [
    "car","truck","bus",
    "person",
    "bicycle","motorcycle",
    "traffic light","stop sign",
    "dog","cat","cow","horse","sheep"
];

/* TOGGLE */
toggle.addEventListener("click", ()=>{
    systemEnabled = !systemEnabled;
    toggle.classList.toggle("active");
});

/* ENTER */
window.enterSystem = function(){

    if(!systemEnabled){
        alert("Enable system first");
        return;
    }

    startScreen.style.display="none";
    mainUI.style.display="block";

    startCamera();
};

/* CAMERA */
function startCamera(){
    navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:{ideal:"environment"},
            width:{ideal:1280},
            height:{ideal:720}
        }
    })
    .then(stream=>{
        video.srcObject = stream;
    })
    .catch(()=>{
        navigator.mediaDevices.getUserMedia({video:true})
        .then(stream=>{
            video.srcObject = stream;
        });
    });
}

/* CANVAS */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 600;

/* SEND FRAME */
function sendFrame(){

    const temp=document.createElement("canvas");
    temp.width=900;
    temp.height=600;

    const tctx=temp.getContext("2d");
    tctx.filter="contrast(1.2) brightness(1.1)";
    tctx.drawImage(video,0,0,900,600);

    temp.toBlob(blob=>{

        const form=new FormData();
        form.append("image",blob);

        const start=performance.now();

        fetch("https://hdadbprjct.duckdns.org/detect",{
            method:"POST",
            body:form
        })
        .then(r=>r.json())
        .then(data=>{
            const time=(performance.now()-start).toFixed(0);
            draw(data,time);
        })
        .catch(e=>console.log(e));

    },"image/jpeg",0.7);
}

/* DRAW */
function draw(data,time){

    ctx.clearRect(0,0,900,600);
    ctx.drawImage(video,0,0,900,600);

    let valid=[];

    (data.objects||[]).forEach(o=>{
        if(IMPORTANT.includes(o.label.toLowerCase())){
            valid.push(o);

            ctx.strokeStyle="#00e5ff";
            ctx.strokeRect(o.x1,o.y1,o.x2-o.x1,o.y2-o.y1);

            let text=o.label.toUpperCase();
            let w=ctx.measureText(text).width;

            ctx.fillStyle="rgba(0,229,255,0.25)";
            ctx.fillRect(o.x1,o.y1-25,w+10,20);

            ctx.fillStyle="#00e5ff";
            ctx.fillText(text,o.x1+5,o.y1-5);
        }
    });

    /* LANES */
    (data.lanes||[]).forEach((l,i)=>{
        ctx.strokeStyle=i?"lime":"red";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(l[0],l[1]);
        ctx.lineTo(l[2],l[3]);
        ctx.stroke();
    });

    /* STATUS */
    document.getElementById("obj").innerText="Objects: "+valid.length;

    document.getElementById("lane").innerText=
        data.lane_detected ? "LANE DETECTED" : "NO LANE";

    document.getElementById("weather").innerText=
        "Weather: "+(data.weather||"Clear")+" | "+time+" ms";

    drawGrid(valid);
}

/* GRID */
function drawGrid(objects){

    const rows=8, cols=8;
    const cw=900/cols;
    const ch=600/rows;

    let grid=Array.from({length:rows},()=>Array(cols).fill("HIGH"));

    objects.forEach(o=>{
        let cs=Math.floor(o.x1/cw);
        let ce=Math.floor(o.x2/cw);
        let rs=Math.floor(o.y1/ch);
        let re=Math.floor(o.y2/ch);

        for(let r=rs;r<=re;r++){
            for(let c=cs;c<=ce;c++){
                if(grid[r]) grid[r][c]="LOW";
            }
        }
    });

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){

            let x=c*cw;
            let y=r*ch;

            if(grid[r][c]==="LOW"){
                ctx.fillStyle="rgba(255,0,0,0.25)";
                ctx.fillRect(x,y,cw,ch);
            }

            ctx.strokeStyle="rgba(0,255,255,0.1)";
            ctx.strokeRect(x,y,cw,ch);
        }
    }
}

/* LOOP */
setInterval(sendFrame,300);

});

</script>

</body>
</html>
