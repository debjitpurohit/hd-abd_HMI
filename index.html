<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HD-ADB Advanced System</title>

    <style>
        body {
            margin: 0;
            background: #05070c;
            color: white;
            font-family: Arial;
        }

        #startScreen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #05070c;
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .header {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: #0a0f19;
        }

        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .left {
            width: 260px;
            padding: 15px;
            background: #141928;
        }

        .card {
            background: #ffffff10;
            padding: 12px;
            border-radius: 10px;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 900px;
            height: 600px;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        video,
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlayMsg,
        #dangerOverlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
            font-size: 30px;
        }

        #overlayMsg {
            background: #000000cc;
        }

        #dangerOverlay {
            background: rgba(255, 0, 0, 0.4);
            font-weight: bold;
        }

        .controls {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 220px;
            background: #00000088;
            padding: 10px;
            border-radius: 10px;
        }

        .toggle {
            width: 50px;
            height: 25px;
            background: #333;
            border-radius: 25px;
            position: relative;
            cursor: pointer;
            margin-top: 10px;
        }

        .toggle::after {
            content: "";
            width: 20px;
            height: 20px;
            background: white;
            position: absolute;
            top: 2.5px;
            left: 3px;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle.active {
            background: #00e5ff;
        }

        .toggle.active::after {
            left: 25px;
        }
    </style>
</head>

<body>

    <!-- START -->
    <div id="startScreen">
        <h1 style="color:#00e5ff;">HD-ADB SYSTEM</h1>
        <div>ENABLE SYSTEM</div>
        <div class="toggle" id="systemToggle"></div>

        <button onclick="enterSystem()"
            style="margin-top:20px;padding:10px 25px;background:#00e5ff;border:none;border-radius:20px;">
            ENTER
        </button>
    </div>

    <!-- MAIN -->
    <div id="mainUI" style="display:none;">

        <div class="header">HD-ADB LIVE</div>

        <div class="container">

            <div class="left">
                <div class="card">
                    <div id="person">Persons: 0</div>
                    <div id="vehicle">Vehicles: 0</div>
                    <div id="twowheel">Two-Wheelers: 0</div>
                    <div id="animal">Animals: 0</div>
                    <div id="signal">Signals: 0</div>
                </div>
            </div>

            <div class="right">
                <div class="box">

                    <video id="video" autoplay></video>
                    <canvas id="canvas"></canvas>

                    <div id="overlayMsg">STREAM OFF</div>
                    <div id="dangerOverlay">⚠️ BRAKE IMMEDIATELY</div>

                    <div class="controls">
                        <div id="laneStatus">NO LANE</div>

                        <div id="weatherBox">
                            <div id="weatherIcon">☀️</div>
                            <div id="weatherText">Clear</div>
                        </div>

                        <div>STREAM</div>
                        <div class="toggle" id="streamToggle"></div>
                    </div>

                </div>
            </div>

        </div>
    </div>
<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 600;

let bright=false;

/* IMPORTANT CLASSES */
const IMPORTANT = [
    "car","truck","bus",
    "person",
    "bicycle","motorcycle",
    "traffic light","stop sign",
    "dog","cat","cow","horse","sheep"
];

/* toggle */
document.getElementById("bright").onclick=()=>{
    bright=!bright;
    document.getElementById("bright").classList.toggle("active");
};

/* 🔥 IMPROVED CAMERA QUALITY */
navigator.mediaDevices.getUserMedia({
    video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1280 },
        height: { ideal: 720 },
        frameRate: { ideal: 30 }
    }
})
.then(stream=>{
    video.srcObject = stream;
})
.catch(()=>{
    return navigator.mediaDevices.getUserMedia({video:true});
})
.then(stream=>{
    video.srcObject = stream;
});

/* SEND FRAME */
function sendFrame(){

    const temp=document.createElement("canvas");
    temp.width=900;
    temp.height=600;

    const tctx=temp.getContext("2d");

    // 🔥 IMPROVE CONTRAST (helps YOLO)
    tctx.filter = "contrast(1.2) brightness(1.1)";
    tctx.drawImage(video,0,0,900,600);

    temp.toBlob(blob=>{

        const form=new FormData();
        form.append("image",blob,"frame.jpg");

        const start = performance.now();

        fetch("https://hdadbprjct.duckdns.org/detect",{
            method:"POST",
            body:form
        })
        .then(r=>r.json())
        .then(data=>{

            const end = performance.now();
            const timeTaken = (end - start).toFixed(0);

            draw(data,timeTaken);
        })
        .catch(e=>{
            console.log("API ERROR:",e);
        });

    },"image/jpeg",0.7); // 🔥 compression helps speed
}

/* DRAW */
function draw(data,time){

    ctx.clearRect(0,0,900,600);
    ctx.drawImage(video,0,0,900,600);

    let validObjects = [];

    /* FILTER IMPORTANT CLASSES */
    (data.objects||[]).forEach(o=>{
        if(IMPORTANT.includes(o.label.toLowerCase())){
            validObjects.push(o);

            ctx.strokeStyle="#00e5ff";
            ctx.lineWidth = 2;
            ctx.strokeRect(o.x1,o.y1,o.x2-o.x1,o.y2-o.y1);

            let text = o.label.toUpperCase();
            let w = ctx.measureText(text).width;

            ctx.fillStyle="rgba(0,229,255,0.25)";
            ctx.fillRect(o.x1,o.y1-25,w+10,20);

            ctx.fillStyle="#00e5ff";
            ctx.fillText(text,o.x1+5,o.y1-5);
        }
    });

    /* LANES */
    (data.lanes||[]).forEach((l,i)=>{
        ctx.strokeStyle=i?"lime":"red";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(l[0],l[1]);
        ctx.lineTo(l[2],l[3]);
        ctx.stroke();
    });

    /* STATUS */
    document.getElementById("obj").innerText =
        "Objects: " + validObjects.length;

    document.getElementById("lane").innerText =
        data.lane_detected ? "LANE DETECTED" : "NO LANE";

    document.getElementById("weather").innerText =
        "Weather: " + (data.weather || "Clear") + " | " + time + " ms";

    drawGrid(validObjects);
}

/* GRID */
function drawGrid(objects){

    const rows=8, cols=8;
    const cw=900/cols;
    const ch=600/rows;

    let grid=Array.from({length:rows},()=>Array(cols).fill("HIGH"));

    objects.forEach(o=>{
        let cs=Math.floor(o.x1/cw);
        let ce=Math.floor(o.x2/cw);
        let rs=Math.floor(o.y1/ch);
        let re=Math.floor(o.y2/ch);

        for(let r=rs;r<=re;r++){
            for(let c=cs;c<=ce;c++){
                if(grid[r]) grid[r][c]="LOW";
            }
        }
    });

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){

            let x=c*cw;
            let y=r*ch;

            if(grid[r][c]==="LOW"){
                ctx.fillStyle=bright?"rgba(255,0,0,0.35)":"rgba(255,0,0,0.2)";
                ctx.fillRect(x,y,cw,ch);
                ctx.fillStyle="red";
                ctx.fillText("LOW",x+5,y+15);
            }

            ctx.strokeStyle="rgba(0,255,255,0.1)";
            ctx.strokeRect(x,y,cw,ch);
        }
    }
}

/* LOOP (slightly slower = stable) */
setInterval(sendFrame,300);

</script>
  

</body>

</html>
