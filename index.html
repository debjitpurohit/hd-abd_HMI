<script>

document.addEventListener("DOMContentLoaded", ()=>{

let systemEnabled = false;
let lastSpoken = 0;
let messageTimeout = null;

const toggle = document.getElementById("systemToggle");
const startScreen = document.getElementById("startScreen");
const mainUI = document.getElementById("mainUI");

/* IMPORTANT CLASSES */
const IMPORTANT = [
    "car","truck","bus",
    "person",
    "bicycle","motorcycle",
    "traffic light","stop sign",
    "dog","cat","cow","horse","sheep"
];

/* CATEGORY GROUPING */
const CATEGORY = {
    person:["person"],
    vehicle:["car","truck","bus"],
    twowheel:["bicycle","motorcycle"],
    animal:["dog","cat","cow","horse","sheep"]
};

/* TOGGLE */
toggle.addEventListener("click", ()=>{
    systemEnabled = !systemEnabled;
    toggle.classList.toggle("active");
});

/* ENTER */
window.enterSystem = function(){

    if(!systemEnabled){
        alert("Enable system first");
        return;
    }

    startScreen.style.display="none";
    mainUI.style.display="block";

    startCamera();
};

/* CAMERA */
function startCamera(){
    navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:{ideal:"environment"},
            width:{ideal:1280},
            height:{ideal:720}
        }
    })
    .then(stream=>{
        video.srcObject = stream;
    })
    .catch(()=>{
        navigator.mediaDevices.getUserMedia({video:true})
        .then(stream=>{
            video.srcObject = stream;
        });
    });
}

/* CANVAS */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 600;

/* 🔊 VOICE FUNCTION */
function speak(msg){
    let now = Date.now();
    if(now - lastSpoken < 3000) return;

    speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
    lastSpoken = now;
}

/* 📢 LEFT MESSAGE */
function showMessage(text, fallbackCount){
    const obj = document.getElementById("obj");

    obj.innerText = text;

    if(messageTimeout) clearTimeout(messageTimeout);

    messageTimeout = setTimeout(()=>{
        obj.innerText = "Objects: " + fallbackCount;
    },5000);
}

/* SEND FRAME */
function sendFrame(){

    const temp=document.createElement("canvas");
    temp.width=900;
    temp.height=600;

    const tctx=temp.getContext("2d");
    tctx.filter="contrast(1.2) brightness(1.1)";
    tctx.drawImage(video,0,0,900,600);

    temp.toBlob(blob=>{

        const form=new FormData();
        form.append("image",blob);

        const start=performance.now();

        fetch("https://hdadbprjct.duckdns.org/detect",{
            method:"POST",
            body:form
        })
        .then(r=>r.json())
        .then(data=>{
            const time=(performance.now()-start).toFixed(0);
            draw(data,time);
        })
        .catch(e=>console.log(e));

    },"image/jpeg",0.7);
}

/* DRAW */
function draw(data,time){

    ctx.clearRect(0,0,900,600);
    ctx.drawImage(video,0,0,900,600);

    let valid=[];
    let count = {person:0,vehicle:0,twowheel:0,animal:0};

    (data.objects||[]).forEach(o=>{
        let label = o.label.toLowerCase();

        if(IMPORTANT.includes(label)){
            valid.push(o);

            /* COUNT */
            for(let k in CATEGORY){
                if(CATEGORY[k].includes(label)){
                    count[k]++;
                }
            }

            /* DRAW BOX */
            ctx.strokeStyle="#00e5ff";
            ctx.strokeRect(o.x1,o.y1,o.x2-o.x1,o.y2-o.y1);

            let text=label.toUpperCase();
            let w=ctx.measureText(text).width;

            ctx.fillStyle="rgba(0,229,255,0.25)";
            ctx.fillRect(o.x1,o.y1-25,w+10,20);

            ctx.fillStyle="#00e5ff";
            ctx.fillText(text,o.x1+5,o.y1-5);
        }
    });

    /* 🔊 VOICE + MESSAGE */
    if(count.person>0){
        speak(count.person+" person detected");
        showMessage(count.person+" Person Detected", valid.length);
    }
    else if(count.vehicle>0){
        speak(count.vehicle+" vehicle detected");
        showMessage(count.vehicle+" Vehicle Detected", valid.length);
    }
    else if(count.animal>0){
        speak(count.animal+" animal detected");
        showMessage(count.animal+" Animal Detected", valid.length);
    }

    /* 🛣️ LANE */
    document.getElementById("lane").innerText =
        data.lane_detected ? "🟢 LANE DETECTED" : "🔴 NO LANE";

    /* 🌦️ WEATHER */
    let weather=(data.weather||"clear").toLowerCase();
    let icon="☀️";

    if(weather.includes("rain")) icon="🌧️";
    else if(weather.includes("cloud")) icon="☁️";
    else if(weather.includes("fog")) icon="🌫️";

    document.getElementById("weather").innerText =
        icon+" "+weather.toUpperCase()+" | "+time+" ms";

    drawGrid(valid);
}

/* GRID */
function drawGrid(objects){

    const rows=8, cols=8;
    const cw=900/cols;
    const ch=600/rows;

    let grid=Array.from({length:rows},()=>Array(cols).fill("HIGH"));

    objects.forEach(o=>{
        let cs=Math.floor(o.x1/cw);
        let ce=Math.floor(o.x2/cw);
        let rs=Math.floor(o.y1/ch);
        let re=Math.floor(o.y2/ch);

        for(let r=rs;r<=re;r++){
            for(let c=cs;c<=ce;c++){
                if(grid[r]) grid[r][c]="LOW";
            }
        }
    });

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){

            let x=c*cw;
            let y=r*ch;

            if(grid[r][c]==="LOW"){
                ctx.fillStyle="rgba(255,0,0,0.25)";
                ctx.fillRect(x,y,cw,ch);
            }

            ctx.strokeStyle="rgba(0,255,255,0.1)";
            ctx.strokeRect(x,y,cw,ch);
        }
    }
}

/* LOOP */
setInterval(sendFrame,300);

});

</script>
